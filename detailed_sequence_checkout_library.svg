<rect class="note" x="60" y="1140" width="1680" height="42" rx="6" ry="6"/>
<text class="t" x="900" y="1167" font-size="13" font-weight="400" text-anchor="middle">读图顺序：先从系统顺序图抽取系统事件 start/add/confirm，再用 Controller 接收事件，用 Service 协调领域对象与 Repository。</text>
