<text class="t title" x="900" y="44" font-size="28" font-weight="700" text-anchor="middle">详细顺序图：办理借书用例（集中式控制）</text>
<text class="t subtitle" x="900" y="78" font-size="16" font-weight="400" text-anchor="middle">由系统顺序图的系统事件展开为内部对象协作：Boundary → Controller → Service → Repository / Entity</text>
